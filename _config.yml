  # books:
  #   title: 'Books'
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                    : 
breadcrumbs               : false
words_per_minute          : 160
future                    : true
read_more                 : "disabled"
talkmap_link              : false

# SEO Related
google_site_verification  : 
bing_site_verification    : 
alexa_site_verification   : 
yandex_site_verification  : 

# Analytics
analytics:
  provider                : "false"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - node_modules
  - package.json
  - README
  - Gemfile
  - Gemfile.lock

# Collections - These control the navigation sections
collections:
  # teaching:      # Commented out: no teaching experience in resume
  #   output: true
  #   permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:       # Use this for your projects like "Web Situational Awareness" or "openGauss integration"
    output: true
    permalink: /:collection/:path/
  # talks:         # Commented out: no talks in resume
  #   output: true
  #   permalink: /:collection/:path/

# Markdown Processing
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji